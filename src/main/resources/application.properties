# Hibernate Search Configuration
spring.jpa.properties.hibernate.search.backend.analysis.configurer=com.example.backend.config.SearchAnalyzerConfig
spring.jpa.properties.hibernate.search.backend.directory.root=./search-index
spring.jpa.properties.hibernate.search.backend.lucene_version=LATEST

spring.jackson.deserialization.fail-on-unknown-properties=true